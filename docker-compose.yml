# Local infra for RideNow. `docker compose up -d db` gives a Postgres 16
# instance with PostGIS enabled for the spatial matching queries.
services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: ridenow
      POSTGRES_PASSWORD: ridenow
      POSTGRES_DB: ridenow
    ports:
      - "5432:5432"
    volumes:
      - ridenow_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ridenow"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  ridenow_pgdata:
