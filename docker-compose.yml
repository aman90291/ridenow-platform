# Local walking skeleton for RideNow. `docker compose up -d --build` brings up
# the full vertical slice on localhost:
#   db          Postgres 16 + PostGIS (spatial ext enabled by db/init)
#   backend     NestJS API            -> http://localhost:3000/api
#   rider-pwa   static rider client   -> http://localhost:8081
#   driver-pwa  static driver client  -> http://localhost:8082
services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: ridenow
      POSTGRES_PASSWORD: ridenow
      POSTGRES_DB: ridenow
    ports:
      - "5432:5432"
    volumes:
      - ridenow_pgdata:/var/lib/postgresql/data
      # Runs once on an empty data volume: enables the PostGIS extension.
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ridenow"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    ports:
      - "3000:3000"
    environment:
      # Inter-container DB host is the compose service name `db`, not localhost.
      DATABASE_URL: postgres://ridenow:ridenow@db:5432/ridenow
      NODE_ENV: production
      # Browsers load the PWAs from these origins and call the API cross-origin.
      CORS_ORIGINS: http://localhost:8081,http://localhost:8082
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      # node is guaranteed present in the image; avoids assuming curl/wget.
      test:
        - CMD
        - node
        - -e
        - "require('http').get('http://localhost:3000/api/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  rider-pwa:
    build: ./apps/rider-pwa
    ports:
      - "8081:80"
    environment:
      # Points the browser at the host-published backend port.
      API_BASE_URL: http://localhost:3000/api
    depends_on:
      backend:
        condition: service_healthy

  driver-pwa:
    build: ./apps/driver-pwa
    ports:
      - "8082:80"
    environment:
      API_BASE_URL: http://localhost:3000/api
    depends_on:
      backend:
        condition: service_healthy

volumes:
  ridenow_pgdata:
