name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # No package-lock.json is committed for this scaffold, so use `npm install`
      # (npm ci requires a committed lockfile and would fail on a clean checkout).
      - run: npm install
      - run: npm run build --if-present
      - run: npm test --if-present
