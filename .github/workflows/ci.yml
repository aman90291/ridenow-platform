name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # package-lock.json is committed, so use `npm ci` for a clean, reproducible,
      # lockfile-pinned install (it also fails loudly if the lockfile drifts).
      - run: npm ci
      - run: npm run build --if-present
      - run: npm test --if-present
