name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # Uses `npm install` (not `npm ci`) on purpose: package-lock.json lags
      # behind the pg dependency and cannot be regenerated in the authoring
      # sandbox, so `npm ci` would hard-fail on lockfile drift. `npm install`
      # reconciles it.
      # TODO(lockfile-npm-ci): refresh package-lock.json (add pg + @types/pg)
      # and revert this step AND both Dockerfile stages back to `npm ci` so
      # installs are lockfile-pinned/reproducible and drift fails loudly.
      # Greppable marker so this temporary state does not quietly persist.
      - run: npm install --no-audit --no-fund
      - run: npm run build --if-present
      - run: npm test --if-present

  e2e:
    # Boots the full docker-compose walking skeleton on localhost and asserts
    # every endpoint (health, readiness, both PWAs, the db-down 503 path), then
    # tears it down. Fails the build if any assertion fails.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run end-to-end walking-skeleton test
        run: bash scripts/e2e.sh
